version: '3.8'

services:
  running-coach:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: running-coach
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # AI Provider Selection (claude, openai, gemini, ollama)
      - AI_PROVIDER=${AI_PROVIDER:-claude}

      # Claude/Anthropic Configuration
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Google Gemini Configuration
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

      # Ollama Configuration (for local LLMs)
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:latest}

      # Garmin Connect Credentials (for health data sync)
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}

      # Database Configuration
      - DATABASE_URL=postgresql://${POSTGRES_USER:-coach}:${POSTGRES_PASSWORD:-coach_password}@postgres:5432/${POSTGRES_DB:-running_coach}
      - REDIS_URL=redis://redis:6379/0

      # Flask Configuration
      - FLASK_ENV=${FLASK_ENV:-production}
      - PORT=5000
      - HOST=0.0.0.0
      - DEBUG=${DEBUG:-false}

    volumes:
      # Persist athlete data
      - ./data:/app/data
      # Persist agent configurations
      - ./.claude:/app/.claude
      # Persist config
      - ./config:/app/config

    networks:
      - running-coach-network

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: running-coach-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-coach}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-coach_password}
      - POSTGRES_DB=${POSTGRES_DB:-running_coach}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - running-coach-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coach} -d ${POSTGRES_DB:-running_coach}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Queue
  redis:
    image: redis:7-alpine
    container_name: running-coach-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - running-coach-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Include Ollama for local LLM support
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - running-coach-network
    profiles:
      - ollama

networks:
  running-coach-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
